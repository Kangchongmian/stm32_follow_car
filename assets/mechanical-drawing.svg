<svg xmlns="http://www.w3.org/2000/svg" width="1189" height="841" viewBox="0 0 1189 841">
  <defs>
    <style>
      .title{font:700 26px Arial,"Microsoft YaHei",sans-serif;fill:#111}.sub{font:16px Arial,"Microsoft YaHei",sans-serif;fill:#333}.label{font:13px Arial,"Microsoft YaHei",sans-serif;fill:#111}.dim{font:12px Arial,"Microsoft YaHei",sans-serif;fill:#0b5394}.part{fill:#f7f7f7;stroke:#111;stroke-width:2}.cut{fill:#fff;stroke:#d00000;stroke-width:2}.center{stroke:#666;stroke-width:1;stroke-dasharray:6 5}.dimline{stroke:#0b5394;stroke-width:1.5;marker-start:url(#arrow);marker-end:url(#arrow)}.thin{stroke:#555;stroke-width:1;fill:none}.sensor{fill:#d9ead3;stroke:#38761d;stroke-width:2}.motor{fill:#fce5cd;stroke:#b45f06;stroke-width:2}.wheel{fill:#ddd;stroke:#333;stroke-width:2}.board{fill:#d9eaf7;stroke:#1155cc;stroke-width:2}.battery{fill:#eadcf8;stroke:#674ea7;stroke-width:2}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#0b5394"/></marker>
  </defs>
  <rect x="0" y="0" width="1189" height="841" fill="#fff"/>
  <text x="40" y="42" class="title">自动跟随小车机械图纸（参考版）</text>
  <text x="40" y="68" class="sub">单位：mm；底盘：250 × 180 × 3；后轮差速 + 前万向轮；适配 STM32/UWB/超声波/LD06</text>

  <!-- Top view scale 2 px/mm, center (310,275) -->
  <text x="60" y="105" class="sub">A. 俯视底盘开孔图</text>
  <g transform="translate(310 275) scale(2 -2)">
    <rect class="part" x="-125" y="-90" width="250" height="180" rx="10" ry="10"/>
    <line class="center" x1="-130" y1="0" x2="130" y2="0"/>
    <line class="center" x1="0" y1="-95" x2="0" y2="95"/>
    <!-- main board -->
    <rect class="board" x="-45" y="-30" width="80" height="60"/>
    <circle class="cut" cx="-45" cy="-30" r="1.6"/><circle class="cut" cx="-45" cy="30" r="1.6"/><circle class="cut" cx="35" cy="-30" r="1.6"/><circle class="cut" cx="35" cy="30" r="1.6"/>
    <!-- battery -->
    <rect class="battery" x="-20" y="-32.5" width="110" height="65"/>
    <rect class="cut" x="-29" y="-47" width="18" height="4" rx="2"/><rect class="cut" x="-29" y="43" width="18" height="4" rx="2"/><rect class="cut" x="56" y="-47" width="18" height="4" rx="2"/><rect class="cut" x="56" y="43" width="18" height="4" rx="2"/>
    <!-- motor slots -->
    <rect class="motor" x="-105" y="62" width="50" height="26" rx="3"/><rect class="motor" x="-105" y="-88" width="50" height="26" rx="3"/>
    <rect class="cut" x="-98.5" y="71.5" width="28" height="7" rx="3.5"/><rect class="cut" x="-63.5" y="71.5" width="28" height="7" rx="3.5"/>
    <rect class="cut" x="-98.5" y="-78.5" width="28" height="7" rx="3.5"/><rect class="cut" x="-63.5" y="-78.5" width="28" height="7" rx="3.5"/>
    <!-- front caster -->
    <rect class="thin" x="72.5" y="-18" width="37.5" height="36"/>
    <circle class="cut" cx="85" cy="-18" r="1.6"/><circle class="cut" cx="85" cy="18" r="1.6"/><circle class="cut" cx="110" cy="-18" r="1.6"/><circle class="cut" cx="110" cy="18" r="1.6"/>
    <!-- sensors and lidar -->
    <circle class="cut" cx="118" cy="55" r="1.6"/><circle class="cut" cx="118" cy="-55" r="1.6"/>
    <rect class="sensor" x="108" y="45" width="18" height="20" rx="2"/><rect class="sensor" x="108" y="-65" width="18" height="20" rx="2"/>
    <rect class="sensor" x="95" y="-10" width="20" height="20" rx="2"/>
    <circle class="cut" cx="95" cy="-10" r="1.6"/><circle class="cut" cx="95" cy="10" r="1.6"/><circle class="cut" cx="115" cy="-10" r="1.6"/><circle class="cut" cx="115" cy="10" r="1.6"/>
    <!-- UWB base -->
    <rect class="thin" x="-50" y="-15" width="30" height="30"/>
    <circle class="cut" cx="-50" cy="-15" r="1.6"/><circle class="cut" cx="-50" cy="15" r="1.6"/><circle class="cut" cx="-20" cy="-15" r="1.6"/><circle class="cut" cx="-20" cy="15" r="1.6"/>
    <!-- cable tie holes -->
    <rect class="cut" x="-115" y="-65" width="10" height="3" rx="1.5"/><rect class="cut" x="-115" y="58" width="10" height="3" rx="1.5"/><rect class="cut" x="20" y="-80" width="10" height="3" rx="1.5"/><rect class="cut" x="20" y="72" width="10" height="3" rx="1.5"/>
  </g>
  <text x="215" y="284" class="label">主控 80×60</text><text x="398" y="284" class="label">电池 110×65</text><text x="520" y="170" class="label">前超声波</text><text x="506" y="275" class="label">LD06</text><text x="172" y="245" class="label">UWB底座</text>
  <line class="dimline" x1="60" y1="475" x2="560" y2="475"/><text x="286" y="494" class="dim">250</text>
  <line class="dimline" x1="570" y1="455" x2="570" y2="95"/><text x="578" y="280" class="dim">180</text>
  <text x="72" y="520" class="label">红色轮廓为切割孔/槽；蓝色为主控；紫色为电池；绿色为传感器；橙色为电机支架区域。</text>

  <!-- Side view -->
  <text x="650" y="105" class="sub">B. 侧视高度布置图</text>
  <g transform="translate(680 360)">
    <rect class="part" x="0" y="-95" width="430" height="8" rx="2"/>
    <circle class="wheel" cx="80" cy="-35" r="55"/><circle class="wheel" cx="330" cy="-50" r="40"/>
    <rect class="motor" x="45" y="-115" width="80" height="35" rx="4"/>
    <rect class="sensor" x="365" y="-150" width="48" height="42" rx="4"/>
    <line class="thin" x1="150" y1="-95" x2="150" y2="-245"/><rect class="sensor" x="130" y="-285" width="40" height="40" rx="4"/>
    <rect class="battery" x="185" y="-132" width="125" height="32" rx="3"/>
    <rect class="board" x="140" y="-132" width="70" height="25" rx="3"/>
    <text x="60" y="40" class="label">后驱动轮 Ø65</text><text x="292" y="25" class="label">前万向轮</text><text x="127" y="-300" class="label">UWB</text><text x="360" y="-160" class="label">前传感器</text>
    <line class="dimline" x1="80" y1="25" x2="330" y2="25"/><text x="190" y="20" class="dim">轴距约145</text>
    <line class="dimline" x1="430" y1="-95" x2="430" y2="-245"/><text x="438" y="-165" class="dim">UWB高80~120</text>
  </g>

  <!-- Front view -->
  <text x="650" y="575" class="sub">C. 前视传感器布置图</text>
  <g transform="translate(720 720)">
    <rect class="part" x="0" y="-80" width="360" height="8" rx="2"/>
    <circle class="wheel" cx="55" cy="-32" r="45"/><circle class="wheel" cx="305" cy="-32" r="45"/>
    <rect class="sensor" x="52" y="-145" width="60" height="35" rx="4"/><rect class="sensor" x="248" y="-145" width="60" height="35" rx="4"/>
    <circle class="sensor" cx="180" cy="-155" r="28"/>
    <line class="center" x1="180" y1="-190" x2="180" y2="-60"/>
    <line class="dimline" x1="55" y1="28" x2="305" y2="28"/><text x="158" y="23" class="dim">轮距150</text>
    <line class="dimline" x1="82" y1="-100" x2="278" y2="-100"/><text x="155" y="-105" class="dim">超声波中心距110</text>
    <text x="60" y="-155" class="label">左超声波</text><text x="248" y="-155" class="label">右超声波</text><text x="160" y="-195" class="label">LD06</text>
  </g>

  <text x="40" y="805" class="sub">备注：本图为结构参考图，实际加工前请按电机、轮胎、电池、传感器实物尺寸复核孔位。</text>
</svg>
